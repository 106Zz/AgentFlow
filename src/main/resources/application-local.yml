spring:
  application:
    name: ai-agent
  
  cloud:
    nacos:
      config:
        import-check:
          enabled: false  # 禁用 Nacos 配置导入强制检查

  # 数据源配置（已很好，无需改）
  datasource:
    url: jdbc:postgresql://pgm-bp19f2e2n9u253thdo.rwlb.rds.aliyuncs.com:5432/Agent_Hub
    username: zzzz
    password: 106Zz0106
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: AgentHubHikariPool
      initialization-fail-timeout: -1

  # JPA配置（已很好）
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 文件上传（已很好）
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

  # Redis 配置
  data:
    redis:
      host: 124.70.190.134
      port: 6379
      password:                     # 如果有密码请填写
      database: 0
      timeout: 10000ms
      client-type: lettuce
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
        shutdown-timeout: 100ms

