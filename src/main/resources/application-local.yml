spring:
  application:
#    name: ai-agent
  
  # 排除不需要的自动配置（排除语音相关功能）
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
  
  # 允许循环引用（解决Bean循环依赖问题）
  main:
    allow-circular-references: true

  # 数据源配置
  datasource:
    url: jdbc:postgresql://pgm-bp19f2e2n9u253thdo.rwlb.rds.aliyuncs.com:5432/Agent_Hub
    username: zzzz
    password: 106Zz0106
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      # 优化连接池配置，避免连接被 PostgreSQL 服务端关闭
      idle-timeout: 300000        # 5分钟（小于 PostgreSQL 默认超时）
      max-lifetime: 900000        # 15分钟（小于 PostgreSQL idle_session_timeout）
      keepalive-time: 60000       # 1分钟（心跳检测，保持连接活跃）
      connection-test-query: SELECT 1
      pool-name: AgentHubHikariPool
      initialization-fail-timeout: -1
      # 连接验证配置
      validation-timeout: 3000    # 连接验证超时3秒
      leak-detection-threshold: 60000  # 连接泄漏检测（60秒）

  # JPA配置（已很好）
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 文件上传（已很好）
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

  # Redis 配置
  data:
    redis:
      host: 124.70.190.134
      port: 6379
      password:                     # 如果有密码请填写
      database: 0
      timeout: 10000ms
      client-type: lettuce
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
        shutdown-timeout: 100ms

  # RabbitMQ 配置
  rabbitmq:
    host: 124.70.190.134
    port: 5672
    username: agenthub
    password: agenthub..123
    virtual-host: /agenthub
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
    connection-timeout: 15000

  # Spring AI DashScope 配置
  ai:
    dashscope:
      api-key: sk-2bb62fd51dd646e89e8bffddb8aed7dd
      # 设置超时时间（单位：毫秒）解决大文件处理超时问题
      connection-timeout: 10000
      read-timeout: 60000
      chat:
        options:
          model: deepseek-v3.2
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
    
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        remove-existing-vector-store-table: false

# 应用自定义配置
app:
  rag:
    preload:
      enabled: true
      paths:
        - "classpath:docs/company-rules/*.pdf"

