spring:
  application:
    name: agenthub
  profiles:
    active: local
  main:
    allow-bean-definition-overriding: true

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update                    # 自动更新表结构
    show-sql: false                       # 生产环境关闭SQL日志
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

server:
  port: 8123

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.agenthub.**.domain
  type-handlers-package: com.agenthub.api.common.handler
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# Token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ
  # 令牌有效期（默认30分钟）
  expireTime: 30

# 线程池配置
thread-pool:
  # 文件处理线程池
  file-process:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    keep-alive-seconds: 60
  # 向量化线程池
  vectorize:
    core-pool-size: ${VECTORIZE_CORE_POOL_SIZE:4}
    max-pool-size: ${VECTORIZE_MAX_POOL_SIZE:8}
    queue-capacity: 200
    keep-alive-seconds: 60
  # 通用任务线程池
  task:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 500
    keep-alive-seconds: 60

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.agenthub: debug
    org.springframework.security: debug
    # MyBatis SQL 日志关闭（只在需要时开启）
    com.agenthub.api.*.mapper: warn
    com.baomidou.mybatisplus: warn
    org.apache.ibatis: warn

knowledge:
  retrieval:
    top-k: 5                      # 默认返回数量
    enable-hybrid: true          # 是否启用混合检索
    enable-cache: true           # 是否启用 RAG 结果缓存

# 查询改写配置
query:
  rewrite:
    enabled: true               # 是否启用查询改写（默认关闭，建议先测试再开启）
    count: 3                     # 改写生成的查询数量
    timeout: 10000               # 改写超时时间（毫秒）

# 混合检索配置
hybrid-search:
  enabled: true                   # 混合检索服务开关

  # 召回参数
  vector-top-k: 30               # 向量召回数量
  bm25-top-k: 30                 # BM25 召回数量

  # RRF 参数
  rrf-k: 60                      # RRF 平滑参数

  # BM25 参数
  bm25:
    k1: 1.5                      # 词频饱和参数
    b: 0.75                      # 长度惩罚参数

# GSSC 流水线配置
gssc:
  enabled: true                 # 是否启用 GSSC（默认关闭，建议测试后再开启）
  max-tokens: 3000              # 最大 Token 预算

  # 评分权重配置
  weights:
    relevance: 0.6               # 相关性权重
    recency: 0.3                # 时效性权重
    importance: 0.1             # 重要性权重

  # 选择数量配置
  select:
    evidence-count: 5            # RAG 证据选择数量
    history-count: 3             # 历史记忆选择数量

# Case 快照冻结配置
case:
  freeze:
    enabled: true                # 是否启用 Case 冻结
    sampling-rate: 1.0          # 采样率（0.0-1.0），默认 5%
    fail-only: false             # 是否只记录失败的 Case